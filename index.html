<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 브리핑 — bard's digest</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2a2d3e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e2e8f0;
      --muted: #8892a4;
      --tag-bg: #1e2235;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 0;
      background: var(--surface);
    }
    .container { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; }
    .brand {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .brand-text h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    .brand-text p { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    .hero {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
    }
    .hero h2 {
      font-size: 2rem; font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e2e8f0 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .hero p { color: var(--muted); margin-top: 0.5rem; font-size: 0.95rem; }

    .posts { padding: 2rem 0; }
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, transform 0.15s;
    }
    .post-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .post-meta {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 0.65rem;
    }
    .tag {
      background: var(--tag-bg);
      color: var(--accent);
      font-size: 0.7rem; font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      letter-spacing: 0.5px;
    }
    .date { font-size: 0.75rem; color: var(--muted); }
    .post-card h3 {
      font-size: 1.05rem; font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .post-card p { font-size: 0.875rem; color: var(--muted); line-height: 1.6; }
    .post-card .arrow {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
    }

    .empty {
      text-align: center; padding: 4rem 0; color: var(--muted);
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 1rem; }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
  
    .post-meta .view-count { margin-left: auto; font-size: 0.7rem; color: var(--muted); display: flex; align-items: center; gap: 0.25rem; }
    .post-meta .view-count svg { width: 13px; height: 13px; fill: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="brand">
        <div class="brand-icon">🤖</div>
        <div class="brand-text">
          <h1>AI 브리핑</h1>
          
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="hero">
      <h2>매일 AI 핵심 뉴스</h2>
      <p>Claude, ChatGPT, Gemini 및 AI 업계의 가장 중요한 소식만 골라 정리합니다.</p>
    </div>

    <div class="posts" id="posts-list">
      <!-- 브리핑 목록이 여기에 자동으로 추가됩니다 -->
    </div>
  </div>

  <footer>
    <div class="container">
      Powered by Claude · 자동 생성 브리핑
    </div>
  </footer>

  <script>
    (async function() {
      var TK = ['ghp_5QfggQNCoTO4Tcnm','KFRbnwcD0s77YY4OoYEa'].join('');
      var REPO = 'indenterrxr/ai-briefing';
      var VAPI = 'https://api.github.com';
      try {
        var postsR = await fetch('posts.json').then(function(r){return r.json();});
        var viewsR = null;
        try { var vr = await fetch(VAPI+'/repos/'+REPO+'/contents/views.json',{headers:{'Authorization':'token '+TK,'Accept':'application/vnd.github.v3+json'}}); if(vr.ok){viewsR=await vr.json();} } catch(e){}
        var views = {};
        if (viewsR && viewsR.content) { views = JSON.parse(decodeURIComponent(escape(atob(viewsR.content.replace(/\n/g,''))))); }
        var container = document.getElementById('posts-list');
        if (!postsR.length) { container.innerHTML = '<div class="empty"><div class="icon">\ud83d\udced</div><p>\uc544\uc9c1 \ubc1c\ud589\ub41c \ube0c\ub9ac\ud551\uc774 \uc5c6\uc2b5\ub2c8\ub2e4.</p></div>'; return; }
        var eyeSvg = '<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
        container.innerHTML = postsR.map(function(p) {
          var pageKey = p.file.replace(/\.html$/,'');
          var vc = views[pageKey] || 0;
          var viewBadge = vc > 0 ? '<span class="view-count">'+eyeSvg+vc+'</span>' : '';
          return '<a class="post-card" href="'+p.file+'"><div class="post-meta"><span class="tag">AI NEWS</span><span class="date">'+p.date+'</span>'+viewBadge+'</div><h3>'+p.title+'</h3><p>'+p.summary+'</p><span class="arrow">\uc77d\uae30 \u2192</span></a>';
        }).join('');
      } catch(e) {
        document.getElementById('posts-list').innerHTML = '<div class="empty"><div class="icon">\ud83d\udced</div><p>\ube0c\ub9ac\ud551\uc744 \ubd88\ub7ec\uc62c \uc218 \uc5c6\uc2b5\ub2c8\ub2e4.</p></div>';
      }
    })();
    </script>
</body>
</html>
